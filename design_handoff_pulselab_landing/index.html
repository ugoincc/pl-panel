<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PulseLab — Plataforma de Pesquisa Biométrica</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=Space+Grotesk:wght@300;400;500;600&display=swap" rel="stylesheet" />

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:        #0A1628;
    --navy-light:  #152238;
    --navy-mid:    #1E3048;
    --teal:        #00BFA5;
    --teal-dim:    rgba(0,191,165,0.12);
    --teal-glow:   rgba(0,191,165,0.35);
    --text-primary:#F0F4F8;
    --text-sec:    #8A9BB0;
    --divider:     #1E3048;
    --font-display:'DM Serif Display', Georgia, serif;
    --font-body:   'Space Grotesk', sans-serif;
  }

  html { scroll-behavior: smooth; }

  body {
    background: var(--navy);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-weight: 400;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }

  /* ─── ECG Animation ─────────────────────────── */
  @keyframes ecg-draw {
    0%   { stroke-dashoffset: 1; opacity: 0; }
    5%   { opacity: 1; }
    80%  { opacity: 1; }
    100% { stroke-dashoffset: 0; opacity: 0; }
  }
  .ecg-line {
    stroke-dasharray: 1;
    stroke-dashoffset: 1;
    animation: ecg-draw 4s cubic-bezier(0.4, 0, 0.2, 1) infinite;
  }

  /* ─── Grid texture ──────────────────────────── */
  .grid-bg {
    background-image:
      linear-gradient(var(--divider) 1px, transparent 1px),
      linear-gradient(90deg, var(--divider) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* ─── Scrolled reveal ───────────────────────── */
  @keyframes fade-up {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .reveal { animation: fade-up 0.7s ease both; }
  .reveal-d1 { animation-delay: 0.1s; }
  .reveal-d2 { animation-delay: 0.22s; }
  .reveal-d3 { animation-delay: 0.34s; }
  .reveal-d4 { animation-delay: 0.46s; }

  /* ─── Scrollbar ─────────────────────────────── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--navy); }
  ::-webkit-scrollbar-thumb { background: var(--navy-mid); border-radius: 3px; }

  /* ─── Nav ───────────────────────────────────── */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    display: flex; align-items: center; justify-content: space-between;
    padding: 18px 48px;
    border-bottom: 1px solid transparent;
    transition: background 0.4s, border-color 0.4s, backdrop-filter 0.4s;
  }
  nav.scrolled {
    background: rgba(10,22,40,0.88);
    border-color: var(--divider);
    backdrop-filter: blur(12px);
  }
  .nav-logo {
    font-family: var(--font-display);
    font-size: 1.35rem;
    letter-spacing: -0.01em;
    color: var(--text-primary);
    display: flex; align-items: center; gap: 10px;
  }
  .nav-logo-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--teal);
    box-shadow: 0 0 10px var(--teal-glow);
    flex-shrink: 0;
    animation: heartbeat 1.4s ease-in-out infinite;
  }
  @keyframes heartbeat {
    0%,100% { transform: scale(1);   opacity: 1; }
    50%      { transform: scale(1.5); opacity: 0.7; }
  }
  .nav-btn {
    background: transparent;
    border: 1px solid var(--teal);
    color: var(--teal);
    font-family: var(--font-body);
    font-size: 0.8rem;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 9px 22px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
  }
  .nav-btn:hover {
    background: var(--teal);
    color: var(--navy);
  }

  /* ─── Hero ──────────────────────────────────── */
  .hero {
    position: relative;
    min-height: 100vh;
    display: flex; align-items: center;
    overflow: hidden;
  }
  .hero-inner {
    position: relative; z-index: 2;
    padding: 0 48px;
    max-width: 800px;
    padding-top: 100px;
  }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 10px;
    font-size: 0.72rem;
    font-weight: 500;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 28px;
  }
  .hero-eyebrow::before {
    content: '';
    width: 28px; height: 1px;
    background: var(--teal);
  }
  .hero-title {
    font-family: var(--font-display);
    font-size: clamp(3rem, 6vw, 5.2rem);
    line-height: 1.08;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin-bottom: 24px;
  }
  .hero-title em {
    font-style: italic;
    color: var(--teal);
  }
  .hero-sub {
    font-size: 1.05rem;
    color: var(--text-sec);
    max-width: 480px;
    line-height: 1.7;
    margin-bottom: 44px;
    font-weight: 300;
  }
  .hero-actions { display: flex; align-items: center; gap: 20px; flex-wrap: wrap; }
  .btn-primary {
    background: var(--teal);
    color: var(--navy);
    border: none;
    font-family: var(--font-body);
    font-size: 0.82rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 14px 36px;
    cursor: pointer;
    transition: opacity 0.2s, box-shadow 0.2s, transform 0.15s;
  }
  .btn-primary:hover {
    opacity: 0.9;
    box-shadow: 0 0 28px var(--teal-glow);
    transform: translateY(-1px);
  }
  .btn-secondary {
    background: transparent;
    border: none;
    color: var(--text-sec);
    font-family: var(--font-body);
    font-size: 0.82rem;
    font-weight: 500;
    letter-spacing: 0.06em;
    cursor: pointer;
    display: flex; align-items: center; gap: 8px;
    transition: color 0.2s;
  }
  .btn-secondary:hover { color: var(--text-primary); }
  .btn-secondary svg { transition: transform 0.2s; }
  .btn-secondary:hover svg { transform: translateX(3px); }

  /* ECG Canvas */
  .ecg-canvas {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    width: 100%; height: 160px;
    z-index: 1;
    opacity: 0.55;
    pointer-events: none;
  }
  .hero-grid {
    position: absolute; inset: 0; z-index: 0;
    opacity: 0.3;
    background-image:
      linear-gradient(var(--divider) 1px, transparent 1px),
      linear-gradient(90deg, var(--divider) 1px, transparent 1px);
    background-size: 64px 64px;
  }
  .hero-vignette {
    position: absolute; inset: 0; z-index: 1;
    background: radial-gradient(ellipse at 70% 50%, transparent 30%, var(--navy) 80%);
  }

  /* Live metrics strip */
  .metrics-strip {
    position: absolute; right: 48px; top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    display: flex; flex-direction: column; gap: 20px;
  }
  .metric-card {
    background: rgba(21,34,56,0.7);
    border: 1px solid var(--divider);
    padding: 16px 20px;
    min-width: 130px;
    backdrop-filter: blur(8px);
  }
  .metric-label {
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-sec);
    margin-bottom: 6px;
  }
  .metric-value {
    font-family: var(--font-display);
    font-size: 1.9rem;
    color: var(--text-primary);
    line-height: 1;
  }
  .metric-unit {
    font-family: var(--font-body);
    font-size: 0.7rem;
    color: var(--teal);
    margin-top: 4px;
    font-weight: 500;
  }
  .metric-bar {
    margin-top: 8px;
    height: 2px;
    background: var(--navy-mid);
    position: relative;
    overflow: hidden;
  }
  .metric-bar-fill {
    position: absolute; left: 0; top: 0; height: 100%;
    background: var(--teal);
    transition: width 1s ease;
  }

  /* ─── Section common ─────────────────────────── */
  section {
    padding: 96px 48px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .section-full {
    max-width: none;
    padding-left: 0; padding-right: 0;
  }
  .section-divider {
    width: 100%;
    height: 1px;
    background: var(--divider);
    margin: 0 48px;
    max-width: calc(100% - 96px);
  }
  .section-label {
    font-size: 0.68rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }
  .section-label::before {
    content: '';
    display: inline-block;
    width: 20px; height: 1px;
    background: var(--teal);
  }
  .section-title {
    font-family: var(--font-display);
    font-size: clamp(1.8rem, 3.5vw, 2.8rem);
    line-height: 1.15;
    letter-spacing: -0.02em;
    color: var(--text-primary);
    margin-bottom: 20px;
  }
  .section-body {
    color: var(--text-sec);
    font-size: 0.97rem;
    line-height: 1.75;
    max-width: 620px;
    font-weight: 300;
  }

  /* ─── O que é ────────────────────────────────── */
  .about-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 80px;
    align-items: start;
    margin-top: 56px;
  }
  .about-text p { color: var(--text-sec); line-height: 1.8; font-weight: 300; font-size: 0.97rem; }
  .about-text p + p { margin-top: 20px; }
  .about-stat-col { display: flex; flex-direction: column; gap: 28px; padding-top: 8px; }
  .about-stat {
    border-left: 2px solid var(--teal);
    padding: 4px 0 4px 20px;
  }
  .about-stat-num {
    font-family: var(--font-display);
    font-size: 2.2rem;
    color: var(--text-primary);
    line-height: 1;
  }
  .about-stat-desc {
    font-size: 0.8rem;
    color: var(--text-sec);
    margin-top: 4px;
    font-weight: 300;
  }

  /* ─── Dados coletados ────────────────────────── */
  .data-section {
    background: var(--navy-light);
    border-top: 1px solid var(--divider);
    border-bottom: 1px solid var(--divider);
    padding: 96px 0;
  }
  .data-inner {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 48px;
  }
  .sensor-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 2px;
    margin-top: 56px;
    align-items: stretch;
  }
  .sensor-card {
    background: var(--navy);
    padding: 36px 28px;
    position: relative;
    overflow: hidden;
    transition: background 0.25s;
    cursor: default;
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  .sensor-card::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--teal);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.35s ease;
  }
  .sensor-card:hover::before { transform: scaleX(1); }
  .sensor-card:hover { background: rgba(21,34,56,0.8); }
  .sensor-icon {
    width: 44px; height: 44px;
    border: 1px solid var(--teal);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 24px;
    color: var(--teal);
    position: relative;
  }
  .sensor-icon::after {
    content: '';
    position: absolute; inset: -6px;
    border-radius: 50%;
    border: 1px solid rgba(0,191,165,0.15);
  }
  .sensor-name {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 8px;
  }
  .sensor-title {
    font-family: var(--font-display);
    font-size: 1.25rem;
    color: var(--text-primary);
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .sensor-desc {
    font-size: 0.82rem;
    color: var(--text-sec);
    line-height: 1.65;
    font-weight: 300;
  }
  .sensor-sample {
    margin-top: 20px;
    font-family: 'Courier New', monospace;
    font-size: 0.72rem;
    color: rgba(0,191,165,0.6);
    border-top: 1px solid var(--divider);
    padding-top: 16px;
  }

  /* ─── Como funciona ──────────────────────────── */
  .steps-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0;
    margin-top: 64px;
    position: relative;
  }
  .steps-grid::before {
    content: '';
    position: absolute;
    top: 28px; left: 16.7%; right: 16.7%;
    height: 1px;
    background: linear-gradient(90deg, var(--teal), var(--teal-glow), var(--teal));
    opacity: 0.4;
  }
  .step {
    padding: 0 32px;
    position: relative;
  }
  .step:first-child { padding-left: 0; }
  .step:last-child  { padding-right: 0; }
  .step-num {
    width: 56px; height: 56px;
    border: 1px solid var(--teal);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: var(--font-display);
    font-size: 1.3rem;
    color: var(--teal);
    margin-bottom: 32px;
    background: var(--navy);
    position: relative; z-index: 1;
  }
  .step-title {
    font-family: var(--font-display);
    font-size: 1.3rem;
    color: var(--text-primary);
    margin-bottom: 12px;
    line-height: 1.2;
  }
  .step-desc {
    font-size: 0.88rem;
    color: var(--text-sec);
    line-height: 1.7;
    font-weight: 300;
  }
  .step-tag {
    display: inline-block;
    margin-top: 16px;
    font-size: 0.65rem;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--teal);
    background: var(--teal-dim);
    padding: 4px 10px;
    font-weight: 500;
  }

  /* ─── CTA ────────────────────────────────────── */
  .cta-section {
    text-align: center;
    padding: 120px 48px;
    position: relative;
    overflow: hidden;
  }
  .cta-section::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 600px; height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(0,191,165,0.06) 0%, transparent 70%);
    pointer-events: none;
  }
  .cta-title {
    font-family: var(--font-display);
    font-size: clamp(2rem, 4vw, 3.4rem);
    color: var(--text-primary);
    margin-bottom: 16px;
    line-height: 1.1;
  }
  .cta-sub {
    color: var(--text-sec);
    font-size: 0.95rem;
    margin-bottom: 44px;
    font-weight: 300;
  }

  /* ─── Footer ─────────────────────────────────── */
  footer {
    border-top: 1px solid var(--divider);
    padding: 40px 48px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .footer-logo {
    font-family: var(--font-display);
    font-size: 1rem;
    color: var(--text-primary);
    display: flex; align-items: center; gap: 8px;
  }
  .footer-restricted {
    font-size: 0.72rem;
    color: var(--text-sec);
    letter-spacing: 0.08em;
    border: 1px solid var(--divider);
    padding: 6px 14px;
    text-transform: uppercase;
  }
  .footer-copy {
    font-size: 0.75rem;
    color: var(--text-sec);
    font-weight: 300;
  }

  /* ─── Tweaks ─────────────────────────────────── */
  .tweaks-panel {
    position: fixed;
    bottom: 24px; right: 24px;
    z-index: 9999;
    background: rgba(21,34,56,0.96);
    border: 1px solid var(--divider);
    backdrop-filter: blur(12px);
    padding: 20px;
    min-width: 220px;
    display: none;
  }
  .tweaks-panel.open { display: block; }
  .tweaks-title {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--teal);
    margin-bottom: 16px;
    border-bottom: 1px solid var(--divider);
    padding-bottom: 10px;
  }
  .tweak-item { margin-bottom: 14px; }
  .tweak-label {
    font-size: 0.72rem; color: var(--text-sec);
    margin-bottom: 6px; display: block;
  }
  .tweak-select, .tweak-input {
    width: 100%;
    background: var(--navy);
    border: 1px solid var(--divider);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 0.78rem;
    padding: 6px 10px;
    outline: none;
  }
  .tweak-toggle {
    display: flex; gap: 4px;
  }
  .tweak-opt {
    flex: 1; padding: 6px 0;
    text-align: center;
    font-size: 0.72rem;
    font-weight: 500;
    border: 1px solid var(--divider);
    cursor: pointer;
    color: var(--text-sec);
    transition: all 0.15s;
  }
  .tweak-opt.active {
    background: var(--teal);
    color: var(--navy);
    border-color: var(--teal);
  }

  @media (max-width: 900px) {
    nav { padding: 16px 24px; }
    .hero-inner { padding: 120px 24px 60px; }
    .metrics-strip { display: none; }
    section { padding: 72px 24px; }
    .about-grid { grid-template-columns: 1fr; gap: 40px; }
    .sensor-grid { grid-template-columns: 1fr 1fr; }
    .steps-grid { grid-template-columns: 1fr; }
    .steps-grid::before { display: none; }
    .step { padding: 0 0 40px 0; }
    footer { flex-direction: column; align-items: flex-start; gap: 12px; padding: 32px 24px; }
    .data-inner { padding: 0 24px; }
  }
  @media (max-width: 600px) {
    .sensor-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ── Animated ECG SVG ────────────────────────── */
function ECGLine({ width = 1200, height = 140 }) {
  const mid = height / 2;
  const path = `
    M 0 ${mid}
    L 80 ${mid}
    L 90 ${mid - 5}
    L 100 ${mid + 5}
    L 110 ${mid}
    L 180 ${mid}
    L 190 ${mid - 40}
    L 205 ${mid + 55}
    L 215 ${mid - 20}
    L 228 ${mid + 8}
    L 240 ${mid}
    L 280 ${mid}
    L 290 ${mid - 6}
    L 300 ${mid + 6}
    L 310 ${mid}
    L 440 ${mid}
    L 450 ${mid - 5}
    L 460 ${mid + 5}
    L 470 ${mid}
    L 540 ${mid}
    L 550 ${mid - 42}
    L 565 ${mid + 58}
    L 575 ${mid - 22}
    L 588 ${mid + 8}
    L 600 ${mid}
    L 640 ${mid}
    L 650 ${mid - 6}
    L 660 ${mid + 6}
    L 670 ${mid}
    L 800 ${mid}
    L 810 ${mid - 5}
    L 820 ${mid + 5}
    L 830 ${mid}
    L 900 ${mid}
    L 910 ${mid - 42}
    L 925 ${mid + 58}
    L 935 ${mid - 22}
    L 948 ${mid + 8}
    L 960 ${mid}
    L 1200 ${mid}
  `;
  return (
    <svg className="ecg-canvas" viewBox={`0 0 ${width} ${height}`} preserveAspectRatio="xMidYMid meet">
      <defs>
        <linearGradient id="ecgGrad" x1="0" x2="1" y1="0" y2="0">
          <stop offset="0%"  stopColor="#00BFA5" stopOpacity="0" />
          <stop offset="20%" stopColor="#00BFA5" stopOpacity="0.85" />
          <stop offset="80%" stopColor="#00BFA5" stopOpacity="0.85" />
          <stop offset="100%" stopColor="#00BFA5" stopOpacity="0" />
        </linearGradient>
        <filter id="ecgGlow">
          <feGaussianBlur stdDeviation="2.5" result="blur" />
          <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
        </filter>
      </defs>
      {/* pathLength="1" normalises length so dasharray/dashoffset always cover the full path */}
      <path d={path} fill="none" stroke="url(#ecgGrad)" strokeWidth="1.5"
        pathLength="1" className="ecg-line" filter="url(#ecgGlow)" />
    </svg>
  );
}

/* ── Live Metric Card ─────────────────────────── */
function MetricCard({ label, value, unit, pct, delay }) {
  const [displayed, setDisplayed] = useState(false);
  const [currentVal, setCurrentVal] = useState(value);

  useEffect(() => {
    const t = setTimeout(() => setDisplayed(true), delay || 0);
    return () => clearTimeout(t);
  }, []);

  // Subtle live variance
  useEffect(() => {
    const id = setInterval(() => {
      const delta = (Math.random() - 0.5) * 4;
      setCurrentVal(v => Math.round(v + delta));
    }, 2200);
    return () => clearInterval(id);
  }, []);

  return (
    <div className="metric-card reveal" style={{ opacity: displayed ? 1 : 0, transition: 'opacity 0.6s' }}>
      <div className="metric-label">{label}</div>
      <div className="metric-value">{currentVal}</div>
      <div className="metric-unit">{unit}</div>
      <div className="metric-bar">
        <div className="metric-bar-fill" style={{ width: `${pct}%` }} />
      </div>
    </div>
  );
}

/* ── Sensor Card ─────────────────────────────── */
function SensorCard({ abbr, name, desc, sample, icon }) {
  return (
    <div className="sensor-card">
      <div className="sensor-icon">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
          {icon}
        </svg>
      </div>
      <div className="sensor-name">{abbr}</div>
      <div className="sensor-title">{name}</div>
      <div className="sensor-desc">{desc}</div>
      <div className="sensor-sample">{sample}</div>
    </div>
  );
}

/* ── Nav ─────────────────────────────────────── */
function Nav({ onLogin }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const handler = () => setScrolled(window.scrollY > 40);
    window.addEventListener('scroll', handler);
    return () => window.removeEventListener('scroll', handler);
  }, []);
  return (
    <nav className={scrolled ? 'scrolled' : ''}>
      <div className="nav-logo">
        <div className="nav-logo-dot" />
        PulseLab
      </div>
      <button className="nav-btn" onClick={onLogin}>Acessar Plataforma</button>
    </nav>
  );
}

/* ── Login Modal ─────────────────────────────── */
function LoginModal({ open, onClose }) {
  const [email, setEmail] = useState('');
  const [pass, setPass] = useState('');
  const [loading, setLoading] = useState(false);
  const [err, setErr] = useState('');

  const handleSubmit = e => {
    e.preventDefault();
    if (!email || !pass) { setErr('Preencha todos os campos.'); return; }
    setErr(''); setLoading(true);
    setTimeout(() => { setLoading(false); setErr('Credenciais inválidas ou acesso não autorizado.'); }, 1600);
  };

  if (!open) return null;
  return (
    <div onClick={onClose} style={{
      position:'fixed',inset:0,zIndex:9000,
      background:'rgba(10,22,40,0.88)',
      display:'flex',alignItems:'center',justifyContent:'center',
      backdropFilter:'blur(6px)'
    }}>
      <div onClick={e=>e.stopPropagation()} style={{
        background:'#152238',
        border:'1px solid #1E3048',
        padding:'44px 40px',
        minWidth:340, maxWidth:400, width:'100%',
        position:'relative'
      }}>
        <div style={{fontFamily:'DM Serif Display, serif',fontSize:'1.5rem',color:'#F0F4F8',marginBottom:6}}>
          Acesso Restrito
        </div>
        <div style={{fontSize:'0.8rem',color:'#8A9BB0',marginBottom:28,fontWeight:300}}>
          Exclusivo para pesquisadores autorizados.
        </div>
        <form onSubmit={handleSubmit}>
          <div style={{marginBottom:16}}>
            <label style={{fontSize:'0.72rem',color:'#8A9BB0',letterSpacing:'0.1em',textTransform:'uppercase',display:'block',marginBottom:6}}>E-mail institucional</label>
            <input type="email" value={email} onChange={e=>setEmail(e.target.value)}
              style={{width:'100%',background:'#0A1628',border:'1px solid #1E3048',
                color:'#F0F4F8',fontFamily:'Space Grotesk,sans-serif',fontSize:'0.9rem',
                padding:'10px 14px',outline:'none'}} />
          </div>
          <div style={{marginBottom:24}}>
            <label style={{fontSize:'0.72rem',color:'#8A9BB0',letterSpacing:'0.1em',textTransform:'uppercase',display:'block',marginBottom:6}}>Senha</label>
            <input type="password" value={pass} onChange={e=>setPass(e.target.value)}
              style={{width:'100%',background:'#0A1628',border:'1px solid #1E3048',
                color:'#F0F4F8',fontFamily:'Space Grotesk,sans-serif',fontSize:'0.9rem',
                padding:'10px 14px',outline:'none'}} />
          </div>
          {err && <div style={{fontSize:'0.78rem',color:'#ff6b6b',marginBottom:16}}>{err}</div>}
          <button type="submit" className="btn-primary" style={{width:'100%',padding:'13px 0'}}
            disabled={loading}>
            {loading ? 'Verificando…' : 'Entrar'}
          </button>
        </form>
        <button onClick={onClose} style={{
          position:'absolute',top:16,right:16,
          background:'none',border:'none',color:'#8A9BB0',
          cursor:'pointer',fontSize:'1.1rem',lineHeight:1
        }}>✕</button>
      </div>
    </div>
  );
}

/* ── Tweaks Panel ────────────────────────────── */
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "accentColor": "#00BFA5",
  "heroLayout": "left",
  "showMetrics": "sim"
}/*EDITMODE-END*/;

function TweaksPanel({ open, tweaks, onChange }) {
  if (!open) return null;
  return (
    <div className="tweaks-panel open">
      <div className="tweaks-title">Tweaks</div>

      <div className="tweak-item">
        <span className="tweak-label">Cor de acento</span>
        <div className="tweak-toggle">
          {['#00BFA5','#00A8E8','#7B61FF'].map(c => (
            <div key={c} className={`tweak-opt ${tweaks.accentColor===c?'active':''}`}
              style={tweaks.accentColor===c?{background:c,borderColor:c,color:'#0A1628'}:{}}
              onClick={()=>onChange('accentColor',c)}>
              <span style={{display:'inline-block',width:12,height:12,borderRadius:'50%',background:c,verticalAlign:'middle'}} />
            </div>
          ))}
        </div>
      </div>

      <div className="tweak-item">
        <span className="tweak-label">Métricas no hero</span>
        <div className="tweak-toggle">
          {['sim','não'].map(v=>(
            <div key={v} className={`tweak-opt ${tweaks.showMetrics===v?'active':''}`}
              onClick={()=>onChange('showMetrics',v)}>{v}</div>
          ))}
        </div>
      </div>

      <div className="tweak-item">
        <span className="tweak-label">Alinhamento hero</span>
        <div className="tweak-toggle">
          {['left','center'].map(v=>(
            <div key={v} className={`tweak-opt ${tweaks.heroLayout===v?'active':''}`}
              onClick={()=>onChange('heroLayout',v)}>{v}</div>
          ))}
        </div>
      </div>
    </div>
  );
}

/* ── App ─────────────────────────────────────── */
function App() {
  const [loginOpen, setLoginOpen] = useState(false);
  const [tweaksOpen, setTweaksOpen] = useState(false);
  const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);

  // Listen for tweaks toggle from host
  useEffect(() => {
    const handler = e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaksOpen(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaksOpen(false);
    };
    window.addEventListener('message', handler);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', handler);
  }, []);

  const changeTweak = (k, v) => {
    setTweaks(prev => {
      const next = { ...prev, [k]: v };
      // Apply accent color CSS var
      document.documentElement.style.setProperty('--teal', next.accentColor);
      document.documentElement.style.setProperty('--teal-glow', next.accentColor + '55');
      document.documentElement.style.setProperty('--teal-dim', next.accentColor + '22');
      window.parent.postMessage({ type: '__edit_mode_set_keys', edits: next }, '*');
      return next;
    });
  };

  const sensors = [
    {
      abbr: 'HR', name: 'Frequência Cardíaca',
      desc: 'Batimentos por minuto coletados continuamente pelo sensor óptico PPG do Galaxy Watch.',
      sample: '→ 68 bpm  · 72 bpm  · 75 bpm',
      icon: <><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></>
    },
    {
      abbr: 'HRV', name: 'Variabilidade Cardíaca',
      desc: 'Intervalo R-R entre batimentos — indicador direto da modulação autonômica e do estado de estresse.',
      sample: '→ SDNN: 42ms · RMSSD: 38ms',
      icon: <><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></>
    },
    {
      abbr: 'SpO₂', name: 'Saturação de Oxigênio',
      desc: 'Porcentagem de hemoglobina oxigenada no sangue, medida por espectroscopia óptica.',
      sample: '→ 98%  · 97%  · 98%',
      icon: <><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></>
    },
    {
      abbr: 'EDA', name: 'Nível de Estresse',
      desc: 'Índice composto derivado de HRV e dados de atividade — proxy não-invasivo de carga alostática.',
      sample: '→ Score: 32 · 41 · 38',
      icon: <><path d="M12 2a10 10 0 1 0 10 10"/><path d="M12 6v6l4 2"/></>
    }
  ];

  const steps = [
    {
      num: '01', title: 'Participante autoriza',
      desc: 'O participante instala o app no smartwatch e consente com a coleta de dados biométricos conforme TCLE.',
      tag: 'Consentimento informado'
    },
    {
      num: '02', title: 'Relógio coleta',
      desc: 'O Galaxy Watch monitora passivamente HR, HRV, SpO₂ e estresse sem intervenção ativa do participante.',
      tag: 'Coleta passiva contínua'
    },
    {
      num: '03', title: 'Pesquisador analisa',
      desc: 'Os dados sincronizam com a plataforma central, onde o pesquisador acessa dashboards, exporta séries temporais e gera relatórios.',
      tag: 'Análise centralizada'
    }
  ];

  const heroCenter = tweaks.heroLayout === 'center';

  return (
    <>
      <Nav onLogin={() => setLoginOpen(true)} />
      <LoginModal open={loginOpen} onClose={() => setLoginOpen(false)} />
      <TweaksPanel open={tweaksOpen} tweaks={tweaks} onChange={changeTweak} />

      {/* ─── Hero ─────────────────────────── */}
      <div className="hero" style={{ background: `linear-gradient(135deg, #0A1628 0%, #0d1f3c 100%)` }}>
        <div className="hero-grid" />
        <div className="hero-vignette" />

        <div className="hero-inner reveal" style={heroCenter ? { margin:'0 auto', textAlign:'center', maxWidth:720 } : {}}>
          <div className="hero-eyebrow">Plataforma de Pesquisa Biométrica</div>
          <h1 className="hero-title">
            Dados que revelam<br />o que o <em>corpo</em> diz.
          </h1>
          <p className="hero-sub">
            PulseLab é uma plataforma acadêmica para coleta e análise de biomarcadores de estresse via smartwatch — projetada para pesquisadores que precisam de precisão.
          </p>
          <div className="hero-actions" style={heroCenter?{justifyContent:'center'}:{}}>
            <button className="btn-primary" onClick={() => setLoginOpen(true)}>
              Acessar Plataforma
            </button>
            <button className="btn-secondary" onClick={() => document.getElementById('about').scrollIntoView()}>
              Saiba mais
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.5">
                <path d="M5 12h14M12 5l7 7-7 7"/>
              </svg>
            </button>
          </div>
        </div>

        {tweaks.showMetrics === 'sim' && (
          <div className="metrics-strip">
            <MetricCard label="HR Médio" value={72} unit="bpm · tempo real" pct={62} delay={300} />
            <MetricCard label="HRV" value={44} unit="ms · RMSSD" pct={55} delay={500} />
            <MetricCard label="SpO₂" value={97} unit="% · oximetria" pct={97} delay={700} />
          </div>
        )}

        <ECGLine />
      </div>

      {/* ─── O que é ──────────────────────── */}
      <section id="about">
        <div className="section-label reveal">Sobre a plataforma</div>
        <h2 className="section-title reveal reveal-d1">Uma infraestrutura para pesquisa<br /><em style={{fontStyle:'italic',color:'var(--teal)'}}>séria</em> em biomarcadores.</h2>
        <div className="about-grid">
          <div className="about-text reveal reveal-d2">
            <p>PulseLab centraliza a gestão de estudos longitudinais com dados biométricos coletados passivamente por smartwatches Wear OS. A plataforma elimina a necessidade de planilhas manuais e fragmentação de dados — cada participante gera uma série temporal contínua, acessível em tempo real.</p>
            <p>O foco do sistema é o estudo do estresse crônico e seus correlatos fisiológicos — HRV, cortisol e ativação do sistema nervoso autônomo. Dados sensíveis são tratados conforme diretrizes éticas vigentes, com controle granular de acesso por estudo.</p>
            <p>A arquitetura é modular: pesquisadores configuram protocolos, administram participantes e exportam dados em formatos compatíveis com R, Python e SPSS.</p>
          </div>
          <div className="about-stat-col reveal reveal-d3">
            <div className="about-stat">
              <div className="about-stat-num">4</div>
              <div className="about-stat-desc">Biomarcadores monitorados continuamente</div>
            </div>
            <div className="about-stat">
              <div className="about-stat-num">24h</div>
              <div className="about-stat-desc">Coleta passiva sem intervenção do participante</div>
            </div>
            <div className="about-stat">
              <div className="about-stat-num">∞</div>
              <div className="about-stat-desc">Séries temporais exportáveis em CSV, JSON, HDF5</div>
            </div>
          </div>
        </div>
      </section>

      <div className="section-divider" />

      {/* ─── Dados Coletados ──────────────── */}
      <div className="data-section">
        <div className="data-inner">
          <div className="section-label reveal">Sensores</div>
          <h2 className="section-title reveal reveal-d1">Dados coletados</h2>
          <p className="section-body reveal reveal-d2">
            Quatro fluxos de dados biométricos coletados continuamente pelo sensor óptico e acelerômetro do Galaxy Watch, sincronizados com a plataforma via Wear OS API.
          </p>
          <div className="sensor-grid">
            {sensors.map((s,i) => (
              <div key={s.abbr} className={`reveal reveal-d${i+1}`}>
                <SensorCard {...s} />
              </div>
            ))}
          </div>
        </div>
      </div>

      {/* ─── Como Funciona ────────────────── */}
      <section id="how">
        <div className="section-label reveal">Protocolo</div>
        <h2 className="section-title reveal reveal-d1">Como funciona</h2>
        <div className="steps-grid">
          {steps.map((s,i) => (
            <div key={s.num} className={`step reveal reveal-d${i+1}`}>
              <div className="step-num">{s.num}</div>
              <div className="step-title">{s.title}</div>
              <div className="step-desc">{s.desc}</div>
              <div className="step-tag">{s.tag}</div>
            </div>
          ))}
        </div>
      </section>

      <div className="section-divider" />

      {/* ─── CTA ──────────────────────────── */}
      <div className="cta-section">
        <div className="section-label reveal" style={{justifyContent:'center'}}>Acesso</div>
        <h2 className="cta-title reveal reveal-d1">Pronto para iniciar<br />seu estudo?</h2>
        <p className="cta-sub reveal reveal-d2">Acesso exclusivo a pesquisadores e administradores autorizados.</p>
        <button className="btn-primary reveal reveal-d3" onClick={() => setLoginOpen(true)}
          style={{fontSize:'0.85rem',padding:'15px 48px'}}>
          Entrar na Plataforma
        </button>
      </div>

      {/* ─── Footer ───────────────────────── */}
      <footer>
        <div className="footer-logo">
          <div className="nav-logo-dot" />
          PulseLab Research Platform
        </div>
        <div className="footer-restricted">⚠ Acesso restrito a pesquisadores autorizados</div>
        <div className="footer-copy">© 2026 · Uso exclusivamente acadêmico</div>
      </footer>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
